name: Daily News Digest

on:
  schedule:
    - cron: "5 6 * * *"  # 06:05 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser python-dateutil

      - name: Generate digest post
        run: python tools/news_digest.py

      - name: Commit and push if changed
        run: |
          git config user.name "hirrdirr-news-bot"
          git config user.email "hirrdirr-news-bot@users.noreply.github.com"
          git add _posts/*.md || true
          git diff --cached --quiet && exit 0
          git commit -m "Add daily security digest"
          git push
